<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garmin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #13171f;
    --border: #1e2535;
    --accent: #00e5c8;
    --accent2: #ff5c5c;
    --accent3: #f5a623;
    --accent4: #7b61ff;
    --accent5: #4db8ff;
    --text: #ffffff;
    --muted: #8896b0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    background: rgba(10,12,16,.95);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(10px);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 3px; color: var(--accent);
  }
  .date-badge {
    font-size: 12px; color: var(--muted);
    background: var(--surface);
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border);
  }
  .update-btn {
    background: rgba(0,229,200,.1);
    border: 1px solid rgba(0,229,200,.3);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; padding: 6px 14px;
    border-radius: 20px; cursor: pointer;
    transition: all .2s;
  }
  .update-btn:hover { background: rgba(0,229,200,.2); }

  /* MAIN */
  .main { padding: 28px; max-width: 900px; margin: 0 auto; }

  /* SECTION */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 16px;
  }
  .section-head {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 18px; font-weight: 500;
  }

  /* CARDS GRID */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
    text-align: center;
  }
  .card-icon { font-size: 22px; margin-bottom: 8px; }
  .card-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; line-height: 1;
    color: var(--text);
  }
  .card-unit { font-size: 12px; color: var(--muted); margin-left: 2px; }
  .card-label {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); margin-top: 6px;
  }

  /* SCHLAF BAR */
  .sleep-bar-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .sleep-bar-label { font-size: 11px; color: var(--muted); width: 55px; text-transform: uppercase; letter-spacing: 1px; }
  .sleep-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .sleep-bar-fill { height: 100%; border-radius: 4px; transition: width .8s ease; }
  .sleep-bar-pct { font-size: 11px; color: var(--muted); width: 32px; text-align: right; font-family: 'DM Mono'; }
  .sleep-bar-time { font-size: 11px; color: var(--text); width: 45px; text-align: right; font-family: 'DM Mono'; }

  /* KI ANALYSE */
  .ki-block { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,.05); }
  .ki-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .ki-block-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
  .ki-block-text { font-size: 13px; color: #c0c8e0; line-height: 1.7; }

  /* TAGESFORM */
  .tagesform-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px; line-height: 1;
    text-align: center; margin-bottom: 4px;
  }
  .tagesform-label { text-align: center; font-size: 13px; font-weight: 600; margin-bottom: 16px; }

  /* STATUS */
  .status { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  @media (max-width: 600px) {
    .main { padding: 16px; }
    .topbar { padding: 14px 16px; }
    .cards { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">⬡ GARMIN</div>
  <div class="date-badge" id="date-badge">Lade…</div>
  <button class="update-btn" onclick="loadData()">↻ Aktualisieren</button>
</div>

<div class="main" id="main-content">
  <div class="status">⏳ Lade Daten…</div>
</div>

<script>
function getLive(data, path, fallback) {
  if (!data) return fallback;
  const parts = path.split('.');
  let val = data;
  for (const p of parts) { val = val?.[p]; }
  return val ?? fallback;
}

function scoreColor(score) {
  if (score === '–' || !score) return '#8896b0';
  const s = parseInt(score);
  if (s >= 80) return '#00e5c8';
  if (s >= 60) return '#f5a623';
  return '#ff5c5c';
}

function tagesform(sleep, bb, rhr, stress) {
  let p = 0, max = 0;
  if (sleep !== '–' && sleep) {
    max += 4; const s = parseInt(sleep);
    if (s >= 85) p += 4; else if (s >= 70) p += 3; else if (s >= 55) p += 2; else if (s >= 40) p += 1;
  }
  if (bb !== '–' && bb) {
    max += 3; const b = parseInt(bb);
    if (b >= 75) p += 3; else if (b >= 50) p += 2; else if (b >= 30) p += 1;
  }
  if (rhr !== '–' && rhr) {
    max += 2; const r = parseInt(rhr);
    if (r <= 52) p += 2; else if (r <= 62) p += 1;
  }
  if (stress !== '–' && stress) {
    max += 1; if (parseInt(stress) < 30) p += 1;
  }
  const score = max > 0 ? Math.round((p / max) * 10) : 0;
  const farbe = score >= 8 ? '#00e5c8' : score >= 6 ? '#f5a623' : score >= 4 ? '#ff9040' : '#ff5c5c';
  const label = score >= 8 ? 'Sehr gut' : score >= 6 ? 'Gut' : score >= 4 ? 'Mittel' : 'Erholung nötig';
  return { score, farbe, label };
}

function card(icon, label, value, unit, color) {
  const c = color || '#ffffff';
  return `<div class="card">
    <div class="card-icon">${icon}</div>
    <div><span class="card-value" style="color:${c};">${value}</span><span class="card-unit">${unit}</span></div>
    <div class="card-label">${label}</div>
  </div>`;
}

function sleepBar(name, pct, color, time) {
  return `<div class="sleep-bar-row">
    <div class="sleep-bar-label">${name}</div>
    <div class="sleep-bar-wrap"><div class="sleep-bar-fill" style="width:${pct}%;background:${color};"></div></div>
    <div class="sleep-bar-pct">${pct}%</div>
    <div class="sleep-bar-time">${time}</div>
  </div>`;
}

function render(d) {
  const sc   = getLive(d, 'sleep.score', '–');
  const bb   = getLive(d, 'body_bat.current', '–');
  const rhr  = getLive(d, 'rhr.value', '–');
  const avg7 = getLive(d, 'rhr.avg7', '–');
  const strs = getLive(d, 'stress.avg', '–');
  const spo2 = getLive(d, 'spo2.avg', '–');
  const steps = getLive(d, 'steps.total', '–');
  const stepsPct = getLive(d, 'steps.pct', '–');
  const floors = getLive(d, 'floors.ascended', '–');
  const floorsGoal = getLive(d, 'floors.goal', 10);
  const kg   = getLive(d, 'weight.kg', '–');
  const bmi  = getLive(d, 'weight.bmi', '–');
  const fat  = getLive(d, 'weight.fat_pct', '–');
  const muscle = getLive(d, 'weight.muscle_kg', '–');
  const water = getLive(d, 'weight.water_pct', '–');
  const bone  = getLive(d, 'weight.bone_mass', '–');
  const visc  = getLive(d, 'weight.visceral', '–');
  const sleepTotal = getLive(d, 'sleep.total', '–');
  const deepPct  = getLive(d, 'sleep.deep_pct', 0);
  const remPct   = getLive(d, 'sleep.rem_pct', 0);
  const lightPct = getLive(d, 'sleep.light_pct', 0);
  const deepTime  = getLive(d, 'sleep.deep', '–');
  const remTime   = getLive(d, 'sleep.rem', '–');
  const lightTime = getLive(d, 'sleep.light', '–');

  const tf = tagesform(sc, bb, rhr, strs);

  document.getElementById('date-badge').textContent = d.date || '–';

  // KI Analyse
  let schlafText = '';
  try {
    const s = parseInt(sc);
    if (s >= 85) schlafText = `Schlaf-Score <strong>${s}/100</strong> — ausgezeichnet. Mit ${sleepTotal} Schlaf, ${deepTime} Tiefschlaf und ${remTime} REM hat dein Körper optimale Regeneration bekommen.`;
    else if (s >= 70) schlafText = `Schlaf-Score <strong>${s}/100</strong> — solide Nacht mit ${sleepTotal} Schlaf. Tiefschlaf (${deepTime}) und REM (${remTime}) im normalen Bereich.`;
    else if (s >= 55) schlafText = `Schlaf-Score <strong>${s}/100</strong> — durchwachsene Nacht (${sleepTotal}). Tiefschlaf und REM blieben unter dem Optimum.`;
    else schlafText = `Schlaf-Score <strong>${s}/100</strong> — schwache Nacht. Heute Erholung priorisieren.`;
  } catch(e) { schlafText = `Schlaf: ${sleepTotal} · Score: ${sc}/100`; }

  let bbText = '';
  try {
    const b = parseInt(bb);
    const charged = getLive(d, 'body_bat.charged', '–');
    if (b >= 75) bbText = `Body Battery <strong>${b}%</strong> — voll geladen (+${charged} aufgeladen). Perfekte Voraussetzungen für intensives Training.`;
    else if (b >= 50) bbText = `Body Battery <strong>${b}%</strong> — gute Reserven. Moderates Training möglich.`;
    else if (b >= 30) bbText = `Body Battery <strong>${b}%</strong> — mittlere Reserven. Leichtes Training empfohlen.`;
    else bbText = `Body Battery <strong>${b}%</strong> — niedrig. Heute Erholung priorisieren.`;
  } catch(e) { bbText = `Body Battery: ${bb}%`; }

  let hrText = '';
  try {
    const r = parseInt(rhr), a = parseInt(avg7), diff = r - a;
    if (diff <= -3) hrText = `Ruhepuls <strong>${r} bpm</strong> — ${Math.abs(diff)} bpm unter deinem 7-Tage-Schnitt (${a} bpm). Ausgezeichnete Herzeffizienz.`;
    else if (diff <= 3) hrText = `Ruhepuls <strong>${r} bpm</strong> — im normalen Bereich (Ø 7T: ${a} bpm).`;
    else hrText = `Ruhepuls <strong>${r} bpm</strong> — ${diff} bpm über Schnitt (${a} bpm). Auf Erholung achten.`;
  } catch(e) { hrText = `Ruhepuls: ${rhr} bpm`; }

  let trainText = '';
  try {
    const s = parseInt(sc) || 60;
    const b = parseInt(bb) || 50;
    const comb = (s/100*0.5) + (b/100*0.5);
    if (comb >= 0.75) trainText = '<strong>Idealer Trainingstag.</strong> Intensive Kettlebell- oder Hanteleinheit mit Progressive Overload empfohlen. Optional 20 min Laufband Zone 2.';
    else if (comb >= 0.55) trainText = '<strong>Moderates Training.</strong> Bauchtraining oder leichte Hanteleinheit. Kein neues Maximum heute.';
    else if (comb >= 0.35) trainText = '<strong>Leichtes Training.</strong> 20–30 min lockeres Laufband oder Dehnen.';
    else trainText = '<strong>Ruhetag empfohlen.</strong> Spazieren, dehnen, viel Wasser trinken.';
  } catch(e) { trainText = 'Halte deinen Trainingsrhythmus.'; }

  document.getElementById('main-content').innerHTML = `

    <!-- TAGESFORM -->
    <div class="section">
      <div class="section-head">🤖 KI-Tagesanalyse</div>
      <div style="display:grid;grid-template-columns:120px 1fr;gap:20px;align-items:start;">
        <div>
          <div class="tagesform-score" style="color:${tf.farbe};">${tf.score}</div>
          <div class="tagesform-label" style="color:${tf.farbe};">${tf.label}</div>
          <div style="font-size:10px;color:var(--muted);text-align:center;">/10 Tagesform</div>
        </div>
        <div>
          <div class="ki-block">
            <div class="ki-block-title" style="color:#4db8ff;">😴 Schlaf</div>
            <div class="ki-block-text">${schlafText}</div>
          </div>
          <div class="ki-block">
            <div class="ki-block-title" style="color:#00e5c8;">⚡ Erholung</div>
            <div class="ki-block-text">${bbText} ${hrText}</div>
          </div>
          <div class="ki-block">
            <div class="ki-block-title" style="color:#f5a623;">🏋️ Training heute</div>
            <div class="ki-block-text">${trainText}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- SCHLAF -->
    <div class="section">
      <div class="section-head">😴 Schlaf letzte Nacht</div>
      <div class="cards" style="margin-bottom:18px;">
        ${card('🌙','Gesamt',sleepTotal,'',scoreColor(sc))}
        ${card('📊','Score',sc,'/100',scoreColor(sc))}
        ${card('💤','Tiefschlaf',deepTime,'','#4db8ff')}
        ${card('🧠','REM',remTime,'','#7b61ff')}
        ${card('😪','Leicht',lightTime,'','#8896b0')}
      </div>
      ${sleepBar('Tief', deepPct, '#4db8ff', deepTime)}
      ${sleepBar('REM', remPct, '#7b61ff', remTime)}
      ${sleepBar('Leicht', lightPct, '#8896b0', lightTime)}
    </div>

    <!-- ERHOLUNG -->
    <div class="section">
      <div class="section-head">⚡ Erholung & Vitalwerte</div>
      <div class="cards">
        ${card('🔋','Body Battery',bb,'%',scoreColor(bb))}
        ${card('❤️','Ruhepuls',rhr,'bpm','#ff5c5c')}
        ${card('🧠','Stress Ø',strs,'','#f5a623')}
        ${card('💧','SpO₂',spo2,'%','#4db8ff')}
        ${card('🚶','Schritte',steps,'','#00e5c8')}
        ${card('🪜','Treppen',floors,`/ ${floorsGoal}`, parseFloat(floors) >= floorsGoal ? '#00e5c8' : '#f5a623')}
      </div>
    </div>

    <!-- GEWICHT -->
    <div class="section">
      <div class="section-head">⚖️ Gewicht & Körperzusammensetzung <span style="color:#00e5c8;font-size:9px;margin-left:8px;background:rgba(0,229,200,.1);padding:2px 8px;border-radius:10px;border:1px solid rgba(0,229,200,.2);">WITHINGS → GARMIN</span></div>
      <div class="cards">
        ${card('⚖️','Gewicht',kg,'kg','#f5a623')}
        ${card('📊','BMI',bmi,'','#f5a623')}
        ${card('🔥','Körperfett',fat,'%','#ff5c5c')}
        ${card('💪','Muskeln',muscle,'kg','#00e5c8')}
        ${card('💧','Wasser',water,'%','#4db8ff')}
        ${card('🦴','Knochen',bone,'kg','#7b61ff')}
        ${card('🫀','Viszeral',visc,'','#ff9040')}
      </div>
    </div>

  `;
}

async function loadData() {
  document.getElementById('date-badge').textContent = 'Lade…';
  try {
    const url = 'https://reinhold72.github.io/daten.json?t=' + Date.now();
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (!resp.ok) throw new Error('Keine Daten');
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      '<div class="status">⚠️ Keine Daten verfügbar.<br><br>Bitte Script ausführen:<br><code>python3 ~/garmin_report/garmin_morning_report.py</code></div>';
    document.getElementById('date-badge').textContent = 'Keine Daten';
  }
}

window.addEventListener('load', loadData);
</script>
</body>
</html>
